# ==============================================================================
#                                SSH Settings
# ==============================================================================

ansible_user: root
ansible_ssh_private_key_file: ~/.ssh/id_ed25519
ansible_python_interpreter: auto_silent

# ==============================================================================
#                                  Repository
# ==============================================================================

# Docker Proxy Registry
docker_proxy_registry: "nexus"
# docker_proxy_registry: "harbor"

# =====================================
#                Nexus
# =====================================

# # Nexus Raw hosted repository URL (перенесен в роли)
# full_nexus_raw_hosted_repository_url: "{{ nexus_http_method }}://{{ nexus_image_repository }}:{{ nexus_raw_hosted_repository_port }}/{{ nexus_raw_hosted_repository_name }}"

# # Nexus 3.69.0-02
# nexus_image_repository: "nexus.fillswim.local"
# nexus_http_method: "http"
# nexus_raw_hosted_repository_port: "8081"
# nexus_raw_hosted_repository_name: "repository/raw-hosted"

# Nexus 3.91.1-04 (LXC)
nexus_image_repository: "nexus-lxc.fillswim.local"
nexus_http_method: "https"
nexus_raw_hosted_repository_port: "8443"
nexus_raw_hosted_repository_name: "repository/raw-hosted"

# =====================================
#                Harbor
# =====================================

# Harbor Repository
harbor_repository_url: "harbor.fillswim.local"
full_harbor_repository_url: "https://harbor.fillswim.local"
containerd_certs_dir: "/etc/containerd/certs.d"
harbor_repository_ca_file: "{{ containerd_certs_dir }}/{{ harbor_repository_url }}/ca.crt"

# harbor_repository_username: "admin"
# harbor_repository_password: "Harbor12345"

# ==============================================================================
#                               Kubernetes Version
# ==============================================================================

kubernetes_major_version: "1.35"
kubernetes_minor_version: "1.35.3"

# ==============================================================================
#                               Install Containerd
# ==============================================================================

install_containerd: false
containerd_version: "2.1.4"

# # Containerd Socket
# path_to_cri_socket: "unix:///var/run/containerd/containerd.sock"

# ==============================================================================
#                                 Install CRI-O
# ==============================================================================

# CRI-O (версия берется из kubernetes_major_version)
install_crio: true

# Crio Socket
path_to_cri_socket: "unix:///var/run/crio/crio.sock"

# ==============================================================================
#                                 Install Runc
# ==============================================================================

enable_runc: false
runc_version: "1.3.0"

# ==============================================================================
#                                  CNI Plugin
# ==============================================================================

enable_cni_plugins: false
cni_plugins_version: "1.7.1"

# ==============================================================================
#                           Install-1st-Control-Node.yaml
# ==============================================================================

# Kubeadm
kubeadm_api_version: "v1beta4"

# ==============================================================================
#                                Install NerdCTL
# ==============================================================================

install_nerdctl: true
nerdctl_version: "2.2.2"

# ==============================================================================
#                                 Install Helm
# ==============================================================================

install_helm: true
helm_version: "4.1.4"

# ==============================================================================
#                                 Install K9s
# ==============================================================================

install_k9s: true
k9s_version: "0.50.18"