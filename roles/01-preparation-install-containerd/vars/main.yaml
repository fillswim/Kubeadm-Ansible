---

# repository_path только для Harbor
registries:

  - name: "docker.io"
    server_url: "https://registry-1.docker.io"
    repository_path: "docker-proxy-docker.io" # только для Harbor
    capabilities: ["pull", "resolve"]

  - name: "quay.io"
    server_url: "https://quay.io"
    repository_path: "docker-proxy-quay.io" # только для Harbor
    capabilities: ["pull", "resolve"]

  - name: "registry.k8s.io"
    server_url: "https://registry.k8s.io"
    repository_path: "docker-proxy-registry.k8s.io" # только для Harbor
    capabilities: ["pull", "resolve"]

  - name: "public.ecr.aws"
    server_url: "https://public.ecr.aws"
    repository_path: "docker-proxy-public.ecr.aws" # только для Harbor
    capabilities: ["pull", "resolve"]

