---

# tasks file for 02-High-Availability

# ==============================================================================
#                            Настройка модулей ядра Linux
# ==============================================================================

- name: Изменить настройки ядра Linux (net.ipv4.ip_nonlocal_bind)
  ansible.posix.sysctl:
    sysctl_file: /etc/sysctl.d/99-nonlocal-bind.conf
    name: "net.ipv4.ip_nonlocal_bind"
    value: "1"
    sysctl_set: true
    state: present
    reload: true

# ==============================================================================
#                             Создание системного пользователя
# ==============================================================================

- name: Блок для Altlinux
  become: true
  when:
    - ansible_facts.os_family == "Altlinux"
  block:

    - name: Создание системного пользователя для HAProxy (для Altlinux)
      ansible.builtin.user:
        name: haproxy
        system: true
        shell: /usr/sbin/nologin
        home: /nonexistent
        comment: "HAProxy system user"
        state: present

# ==============================================================================
#                            Установка не на Altlinux
# ==============================================================================

- name: Установка пакетов для Keepalived и HAProxy
  when:
    - ansible_facts.os_family != "Altlinux"
  ansible.builtin.package:
    name:
      - keepalived
      - haproxy
    state: present

# - name: Установка пакетов для Keepalived и HAProxy (на Altlinux)
#   when:
#     - ansible_facts.os_family == "Altlinux"
#   community.general.apt_rpm:
#     update_cache: true
#     pkg:
#       - keepalived
#       - haproxy
#     state: latest

# ==============================================================================
#                         Настройка Keepalived и HAProxy
# ==============================================================================

- name: Скопировать keepalived.conf
  ansible.builtin.template:
    src: keepalived.j2
    dest: /etc/keepalived/keepalived.conf
    mode: '0644'
  notify:
    - Restart keepalived

- name: Скопировать haproxy.cfg
  ansible.builtin.template:
    src: haproxy.j2
    dest: /etc/haproxy/haproxy.cfg
    mode: '0644'
  notify:
    - Restart haproxy
