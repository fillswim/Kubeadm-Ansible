---

- name: Restart containerd
  become: true
  when:
    - "'containerd.service' in ansible_facts.services"
  ansible.builtin.systemd_service:
    name: containerd
    state: restarted
    daemon_reload: true

- name: Run update-ca-trust RedHat
  become: true
  ansible.builtin.command: update-ca-trust
