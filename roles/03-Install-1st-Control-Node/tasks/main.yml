---
# tasks file for 03-Install-1st-Master-Node

# =============================================================================
#                        Проверка, что кластер уже создан
# =============================================================================

- name: Проверка, что кластер уже создан
  ansible.builtin.stat:
    path: "/etc/kubernetes/pki/ca.key"
  register: kubeadm_ca

- name: Конец playbook
  ansible.builtin.meta: end_play
  when: kubeadm_ca.stat.exists

# =============================================================================
#                          Скопировать kubeadm-config.yaml
# =============================================================================

- name: Создание папки "{{ kubeadm_temp_folder }}"
  ansible.builtin.file:
    path: "{{ kubeadm_temp_folder }}"
    state: directory
    owner: root
    group: root
    mode: "0775"

- name: Блок для не на Altlinux
  become: true
  when:
    - ansible_facts.os_family != "Altlinux"
  block:

    - name: Скопировать kubeadm-config.yaml
      become: true
      ansible.builtin.template:
        src: kubeadm-config-{{ kubeadm_api_version }}.yaml.j2
        dest: "{{ kubeadm_temp_folder }}/kubeadm-config.yaml"
        owner: root
        group: root
        mode: "0644"

- name: Блок для Altlinux
  become: true
  when:
    - ansible_facts.os_family == "Altlinux"
  block:

    - name: Скопировать kubeadm-config.yaml (v1beta3) на Altlinux
      become: true
      ansible.builtin.template:
        src: kubeadm-config-altlinux-v1beta3.yaml.j2
        dest: "{{ kubeadm_temp_folder }}/kubeadm-config.yaml"
        owner: root
        group: root
        mode: "0644"

# =============================================================================
#                                Kubeadm Init
# =============================================================================

- name: Проверка, что нода еще не инициализирована
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_admin_conf

- name: Kubeadm Init
  when:
    - not kubeadm_admin_conf.stat.exists
  ansible.builtin.shell: |
    set -o pipefail
    kubeadm init \
    --config "{{ kubeadm_temp_folder }}/kubeadm-config.yaml"
  register: kubeadm_init_result
  args:
    executable: /bin/bash
  notify:
    - Restart kubelet

# - name: Kubeadm Init без kube-proxy (c Cilium)
#   when:
#     - enable_kube_proxy == false
#   ansible.builtin.shell: |
#     set -o pipefail
#     kubeadm init \
#     --config "{{ kubeadm_temp_folder }}/kubeadm-config.yaml" \
#     --skip-phases=addon/kube-proxy
#   register: kubeadm_init_result
#   args:
#     executable: /bin/bash
#   notify:
#     - Restart kubelet

- name: Вывод результатов работы Kubeadm Init
  ansible.builtin.debug:
    var: kubeadm_init_result

- name: Сохранить вывод kubeadm init в файл
  ansible.builtin.copy:
    dest: "{{ kubeadm_temp_folder }}/kubeadm-init.log"
    owner: root
    group: root
    mode: "0644"
    content: "{{ kubeadm_init_result.stdout }}"

- name: (Patch) Изменение конфигурации kubelet (только на Altlinux)
  when:
    - ansible_facts.os_family == "Altlinux"
  ansible.builtin.replace:
    path: /etc/systemd/system/kubelet.service.d/10-kubeadm.conf
    regexp: 'cluster.local'
    replace: '{{ cluster_name }}'
  notify:
    - Restart kubelet

# =============================================================================
#                        Скопировать admin.conf в .kube
# =============================================================================

- name: Создание папки /root/.kube
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    owner: root
    group: root
    mode: "0775"

- name: Скопировать /etc/kubernetes/admin.conf в /root/.kube/config
  become: true
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    owner: root
    group: root
    mode: "0600"

# =============================================================================
#                              Перезагрузка сервера
# =============================================================================

- name: Перезагрузка сервера
  throttle: 1
  become: true
  ansible.builtin.reboot:
